<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rostor | Site in constructie</title>
  <meta
    name="description"
    content="Rostor pregateste noul site. Pentru informatii, contact: robert@rostor.ro."
  >
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap");

    :root {
      --bg: #fbf1da;
      --panel: rgba(255, 244, 212, 0.86);
      --ink: #18130c;
      --muted: #5d513f;
      --accent: #f0a81f;
      --accent-dark: #694300;
      --line: rgba(24, 19, 12, 0.12);
      --shadow: 0 28px 70px rgba(88, 62, 12, 0.18);
      --warning: #222222;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        repeating-linear-gradient(
          -45deg,
          #f7cf5a 0 28px,
          #2b2b2b 28px 56px
        ),
        linear-gradient(180deg, #fff4c9 0%, var(--bg) 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(880px, 100%);
    }

    .hero {
      backdrop-filter: blur(14px);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--warning) 0 50%, var(--accent) 50% 100%);
      box-shadow: 0 0 0 8px rgba(240, 168, 31, 0.15);
    }

    .badge {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(240, 168, 31, 0.16);
      color: var(--accent-dark);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .hero {
      padding: 44px 28px;
      overflow: hidden;
      position: relative;
      text-align: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 2px dashed rgba(24, 19, 12, 0.12);
      border-radius: 26px;
      pointer-events: none;
    }

    .eyebrow {
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-dark);
      margin: 18px 0 14px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 0.98;
      font-weight: 700;
    }

    h1 {
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(3rem, 8vw, 6.3rem);
    }

    .accent-text {
      display: block;
      font-family: "Instrument Serif", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: var(--accent-dark);
      margin-top: 8px;
    }

    .lead {
      max-width: 620px;
      margin: 22px auto 0;
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .mini-note {
      margin-top: 26px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .contact-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 16px 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid var(--line);
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .contact-card:hover {
      background: rgba(255, 255, 255, 0.74);
    }

    .sign-wrap {
      display: grid;
      place-items: center;
      margin: 8px 0 18px;
      padding: 34px 0;
      overflow: visible;
      position: relative;
      z-index: 1;
    }

    .sign {
      width: min(220px, 52vw);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 28px;
      transform: rotate(45deg);
      background:
        linear-gradient(
          135deg,
          var(--warning) 0 16%,
          var(--accent) 16% 34%,
          var(--warning) 34% 50%,
          var(--accent) 50% 66%,
          var(--warning) 66% 84%,
          var(--accent) 84% 100%
        );
      border: 10px solid #fff8df;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.18);
      position: relative;
    }

    .sign::after {
      content: "!";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(4.5rem, 16vw, 8rem);
      font-weight: 700;
      color: #fff8df;
      transform: rotate(-45deg);
    }

    @media (max-width: 640px) {
      .hero {
        padding: 36px 20px;
      }

      .sign-wrap {
        padding: 24px 0 14px;
      }

      .sign {
        width: min(180px, 54vw);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Rostor</span>
      </div>
      <div class="eyebrow">Ne pregatim de lansare</div>
      <div class="sign-wrap">
        <div class="sign" aria-hidden="true"></div>
      </div>
      <h1>
        Site in constructie
        <span class="accent-text">revenim in curand.</span>
      </h1>
      <p class="lead">
        Lucram la noua prezenta online Rostor. Pana la lansarea completa, pentru orice intrebare
        sau solicitare ne poti scrie direct pe email.
      </p>
      <div class="contact-card">
        <span class="badge">Contact: <a href="mailto:robert@rostor.ro">robert@rostor.ro</a></span>
      </div>
      <p class="mini-note">
        Multumim pentru rabdare.
      </p>
    </section>
  </main>
</body>
</html>
